<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>同意書 - PULCHRA</title>
<style>
  body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
  .card { background: white; color: #111; padding: 20px; border-radius: 8px; margin: 10px auto; max-width: 400px; text-align: left; }
  input { width: 100%; padding: 12px; margin: 8px 0 20px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
  button { background: #fff; color: #111; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; font-size: 18px; }
</style>
</head>
<body>
  <h2 style="margin: 30px 0;">PULCHRA 同意書</h2>
  <div class="card">
    <label>お名前</label><input id="name" type="text" placeholder="氏名を入力">
    <label>お電話番号</label><input id="tel" type="tel" placeholder="09012345678">
    <button id="sbtn" onclick="send()">同意して送信</button>
  </div>

<script>
  // これが正しいデータの送り先です
  const URL = "https://script.google.com/macros/s/AKfycbzYo8qfsxSXHNrTek1uht8_1Khidclp-BsDAz5VrxWYr4IaP5KkWMQe0Zcr-aELzsAr0A/exec";

  async function send() {
    const name = document.getElementById('name').value;
    const tel = document.getElementById('tel').value;
    if(!name || !tel) return alert("お名前と電話番号を入れてね！");

    const btn = document.getElementById('sbtn');
    btn.disabled = true; btn.innerText = "送信中...";

    try {
      await fetch(URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ 
          name: name, 
          tel: tel, 
          date: new Date().toLocaleDateString('ja-JP'), 
          options: "同意済み" 
        })
      });
      document.body.innerHTML = "<div style='margin-top:100px;'><h2 style='font-size:60px;'>✅</h2><h2 style='color:#fff;'>送信完了！</h2><p style='color:#aaa;'>ありがとうございました。</p></div>";
    } catch(e) {
      alert("エラー！スタッフを呼んでください");
      btn.disabled = false; btn.innerText = "同意して送信";
    }
  }
</script>
</body>
</html>
